name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend # every `run:` step starts here
    steps:
      - uses: actions/checkout@v5 # the repo is NOT on the runner until this
      - uses: actions/setup-java@v5
        with:
          distribution: temurin # the JDK vendor we also use in the Dockerfile
          java-version: "21"
          cache: maven # keyed on pom.xml; restores ~/.m2 between runs
      - name: Build and test
        run: ./mvnw --batch-mode verify # batch-mode: no interactive/progress noise in logs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install packages
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Build
        run: npm build
