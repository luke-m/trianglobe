name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write # allow this workflow to request GitHub's signed OIDC token

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend # every `run:` step starts here
    steps:
      - uses: actions/checkout@v5 # the repo is NOT on the runner until this
      - uses: actions/setup-java@v5
        with:
          distribution: temurin # the JDK vendor we also use in the Dockerfile
          java-version: "21"
          cache: maven # keyed on pom.xml; restores ~/.m2 between runs
      - name: Build and test
        run: ./mvnw --batch-mode verify # batch-mode: no interactive/progress noise in logs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install packages
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: trianglobe:${{ github.sha }}
          cache-from: type=gha # restore Docker layer cache from previous runs
          cache-to: type=gha,mode=max

      # The three steps below must run ONLY on main, and ONLY once the AWS
      # side exists (Terraform will create the role and store its ARN as the
      # AWS_ROLE_ARN repository variable — until then they must be skipped,
      # or every merge to main goes red).
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' && vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}
      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: ecr
        if: github.ref == 'refs/heads/main' && vars.AWS_ROLE_ARN != ''
      - name: Push image to ECR
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main' && vars.AWS_ROLE_ARN != ''
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/trianglobe:latest
            ${{ steps.ecr.outputs.registry }}/trianglobe:${{ github.sha }}
          cache-from: type=gha # layers were just built above: push is nearly free
